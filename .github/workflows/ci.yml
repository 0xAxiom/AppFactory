name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm run bootstrap

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:all

      - name: Dependency audit
        run: npm run deps:audit
        if: matrix.node-version == 20 # Only run once

      - name: Check outdated dependencies
        run: npm run deps:outdated || true
        if: matrix.node-version == 20 # Only run once

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm run bootstrap

      - name: Build CLI
        run: npm run build:cli

      - name: Build dApp factory
        run: npm run build:dapp

      - name: Upload CLI build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: CLI/dist/

      - name: Upload dApp factory build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dapp-factory-dist
          path: dapp-factory/dist/

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm run bootstrap

      - name: Run linting
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run type checking
        run: npm run type-check

      - name: Run security audit
        run: npm run deps:audit

      - name: Run tests
        run: npm run test:all

      - name: Check for outdated dependencies
        run: npm run deps:outdated
        continue-on-error: true

      - name: Build CLI
        run: npm run build:cli

      - name: Build dApp Factory
        run: npm run build:dapp

      - name: Validate workspace integrity
        run: |
          # Ensure no untracked build artifacts
          if [ -d "claw-pipeline/clawbot-architect" ]; then
            echo "❌ Found untracked build artifact: claw-pipeline/clawbot-architect"
            exit 1
          fi
          echo "✅ Workspace integrity check passed"

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm run bootstrap

      - name: Run security audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Scan for secrets
        run: |
          if [ -f "scripts/security/scan-secrets.js" ]; then
            node scripts/security/scan-secrets.js
          else
            echo "⚠️  Secret scanning script not found, skipping"
          fi
